<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Music Quiz</title>
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Music Quiz">
<meta name="theme-color" content="#0a0a0a">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }
  h1 { font-size: clamp(28px, 7vw, 40px); font-weight: 800; margin: 0 0 8px; letter-spacing: -1px; }
  .tagline { font-size: 13px; color: #666; margin-bottom: 36px; }
  .options { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
  .opt {
    display: block;
    text-decoration: none;
    padding: 22px 20px;
    border-radius: 14px;
    color: #fff;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    transition: transform 0.1s;
  }
  .opt:active { transform: scale(0.98); }
  .opt.primary { background: #1db954; border-color: #1db954; }
  .opt.beta { background: #1a1a1a; border-color: #2a2a2a; }
  .opt .label { font-size: 18px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
  .opt .label .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; background: rgba(255,255,255,0.18); }
  .opt .desc { font-size: 12px; opacity: 0.85; margin-top: 4px; line-height: 1.4; }
  .footer { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; font-size: 10px; color: #444; }
</style>
</head>
<body>
  <h1>Music Quiz</h1>
  <div class="tagline">Welche Version möchtest du starten?</div>

  <div class="options">
    <a class="opt primary" href="./stable.html">
      <div class="label">Stabile Version <span class="tag">empfohlen</span></div>
      <div class="desc">Aktuelle, getestete App. So spielen wir gerade.</div>
    </a>
    <a class="opt beta" href="./v2.html">
      <div class="label">Neue Version <span class="tag">Beta</span></div>
      <div class="desc">In Entwicklung. Hier kommen neue Features rein.</div>
    </a>
  </div>

  <div class="footer">github.com/m-fokus/song_quiz</div>
</body>
</html>
