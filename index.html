<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Music Quiz</title>
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Music Quiz">
<meta name="theme-color" content="#0a0a0a">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  header { width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; font-size: 13px; color: #888; }
  header button, header a.btn { background: none; border: 1px solid #333; color: #aaa; padding: 6px 10px; border-radius: 6px; font-size: 13px; text-decoration: none; cursor: pointer; }
  header .group { display: flex; gap: 6px; }
  .stage { flex: 1; width: 100%; max-width: 480px; display: grid; place-items: center; perspective: 1200px; padding: 8px 0; }
  .card { position: relative; width: var(--card-size); height: var(--card-size); transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.2,.7,.2,1); --card-size: min(calc(100vw - 32px), 70vh, 480px); }
  .card.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .front { position: relative; }
  .qr { width: 64%; aspect-ratio: 1; background: #fff; padding: 10px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .qr svg, .qr img { width: 100%; height: 100%; display: block; }
  .back { transform: rotateY(180deg); color: #111; padding: 8% 8% 6%; text-align: center; position: relative; }
  .back .artist { font-size: clamp(22px, 6.5vw, 34px); font-weight: 700; margin-top: 0; line-height: 1.15; }
  .back .year { font-size: clamp(96px, 28vw, 170px); font-weight: 900; line-height: 0.95; letter-spacing: -4px; margin: 0.1em 0; color: #000; }
  .back .title { font-size: clamp(18px, 5.2vw, 28px); font-style: italic; font-weight: 500; line-height: 1.25; }
  .back .idx { position: absolute; bottom: 10px; right: 14px; font-size: 11px; opacity: 0.55; font-weight: 600; }
  .back .verify, .back .editBtn { position: absolute; bottom: 8px; font-size: 11px; color: #111; text-decoration: none; opacity: 0.55; padding: 4px 8px; border: 1px solid rgba(0,0,0,0.3); border-radius: 6px; background: rgba(255,255,255,0.25); cursor: pointer; }
  .back .verify { left: 12px; }
  .back .editBtn { left: 76px; }
  .back .verify:active, .back .editBtn:active { opacity: 1; }
  .back.edited::after { content: '✎'; position: absolute; top: 10px; right: 14px; font-size: 14px; opacity: 0.55; }
  .controls { width: 100%; max-width: 480px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 12px 0 8px; }
  .controls button { padding: 16px; font-size: 15px; font-weight: 600; border-radius: 12px; border: none; background: #2a2a2a; color: #eee; }
  .controls button.primary { background: #1db954; color: #fff; }
  .controls button:active { transform: scale(0.98); }
  .controls button:disabled { opacity: 0.35; }
  .footer { width: 100%; max-width: 480px; text-align: center; padding: 6px 0 14px; font-size: 11px; color: #555; }
  .status { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); background: #1db954; color: #fff; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 20; }
  .status.show { opacity: 1; }
  .status.err { background: #d04040; }
  .loading { color: #888; font-size: 14px; text-align: center; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10; padding: 16px; }
  .modal.open { display: flex; }
  .modal-box { background: #1a1a1a; color: #eee; border-radius: 14px; width: 100%; max-width: 420px; padding: 20px; }
  .modal-box h2 { margin: 0 0 4px; font-size: 18px; }
  .modal-box .sub { font-size: 12px; color: #888; margin-bottom: 8px; }
  .modal-box label { display: block; font-size: 12px; color: #888; margin: 10px 0 4px; }
  .modal-box input { width: 100%; padding: 10px 12px; font-size: 16px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: #fff; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 14px; }
  .modal-actions .save { background: #1db954; color: #fff; }
  .modal-actions .cancel { background: #2a2a2a; color: #eee; }
  .modal-actions .reset { background: #5a2a2a; color: #fbb; }
  .corr-list { max-height: 60vh; overflow-y: auto; margin: 8px -4px 0; }
  .corr-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; }
  .corr-item:hover, .corr-item:active { background: #2a2a2a; }
  .corr-item .info { flex: 1; min-width: 0; }
  .corr-item .title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .corr-item .meta { font-size: 11px; color: #888; }
  .corr-item .year { font-size: 18px; font-weight: 800; color: #1db954; margin-left: 12px; }
  .corr-empty { text-align: center; color: #666; padding: 24px 0; font-size: 13px; }
</style>
</head>
<body>
<div class="status" id="status"></div>

<header>
  <span id="counter">–</span>
  <div class="group">
    <button id="listBtn">Korrekturen <span id="corrCount">(0)</span></button>
    <button id="shuffleBtn">Neu mischen</button>
  </div>
</header>

<div class="stage">
  <div class="loading" id="loading">Lade Songs…</div>
  <div class="card" id="card" style="display:none">
    <div class="face front" id="front">
      <div class="qr" id="qr"></div>
    </div>
    <div class="face back" id="back">
      <div class="artist" id="artist"></div>
      <div class="year" id="year"></div>
      <div class="title" id="title"></div>
      <div class="idx" id="idx"></div>
      <a class="verify" id="verify" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google ↗</a>
      <button class="editBtn" id="editBtn" onclick="event.stopPropagation(); openEdit()">Bearbeiten</button>
    </div>
  </div>
</div>

<div class="controls">
  <button id="prevBtn" disabled>Zurück</button>
  <button id="flipBtn" disabled>Umdrehen</button>
  <button id="nextBtn" class="primary" disabled>Nächste</button>
</div>
<div class="footer" id="footer">Lade…</div>

<div class="modal" id="listModal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>Korrigierte Songs</h2>
    <div class="sub">Tipp einen Song, um direkt dort hinzuspringen.</div>
    <div class="corr-list" id="corrList"></div>
    <div class="modal-actions">
      <button class="cancel" onclick="closeList()">Schließen</button>
    </div>
  </div>
</div>

<div class="modal" id="editModal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h2>Jahr korrigieren</h2>
    <div class="sub" id="editSongInfo"></div>
    <label for="editYear">Korrektes Jahr</label>
    <input id="editYear" type="number" inputmode="numeric" min="1900" max="2099">
    <div class="modal-actions">
      <button class="cancel" onclick="closeEdit()">Abbrechen</button>
      <button class="reset" onclick="resetOverride()">Zurücksetzen</button>
      <button class="save" onclick="saveOverride()">Speichern</button>
    </div>
  </div>
</div>

<script>
const BIN_ID = '6a1dc80c06141515d3388249';
const ACCESS_KEY = '$2a$10$SOKMRMzDUJmD.NonXmhRGO8TssnS1gSzOtExSmOJpSBTXR6EYQYg2';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const COLORS = ['#e8534a','#f08a3e','#f0c93a','#9ed24a','#4ac98a','#4ab7d2','#5a8de0','#a47ed2','#d26ea8','#e57e7e'];

let songs = [];
let corrections = {};
let deck = [], pos = 0;
let songsVersion = '?';

function showStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
  el.classList.add('show');
  clearTimeout(showStatus._t);
  showStatus._t = setTimeout(() => el.classList.remove('show'), 1800);
}

async function loadSongs() {
  const r = await fetch('./songs.json?v=' + Date.now());
  if (!r.ok) throw new Error('songs.json HTTP ' + r.status);
  const data = await r.json();
  songs = data.songs;
  songsVersion = data.version;
}

async function loadCorrections() {
  try {
    const r = await fetch(BIN_URL + '/latest', { headers: { 'X-Access-Key': ACCESS_KEY } });
    if (!r.ok) throw new Error('JSONBin HTTP ' + r.status);
    const data = await r.json();
    corrections = (data.record && data.record.corrections) || {};
  } catch (e) {
    console.warn('Korrekturen konnten nicht geladen werden:', e);
    showStatus('Korrekturen offline', true);
    corrections = {};
  }
}

async function saveCorrections() {
  const r = await fetch(BIN_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Access-Key': ACCESS_KEY },
    body: JSON.stringify({ corrections })
  });
  if (!r.ok) throw new Error('JSONBin PUT HTTP ' + r.status);
}

function effectiveSong(s) {
  const c = corrections[s.id];
  if (c && c.year_correct) {
    return { ...s, year: c.year_correct, _edited: true, _correctedAt: c.correction_date };
  }
  return { ...s, year: s.year_init };
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQR(url) {
  const el = document.getElementById('qr');
  el.innerHTML = '';
  const qr = qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  el.innerHTML = qr.createSvgTag({ scalable: true, margin: 0 });
  el.onclick = (e) => { e.stopPropagation(); window.location.href = url; };
}

function render() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const raw = deck[pos];
  const song = effectiveSong(raw);
  const color = COLORS[pos % COLORS.length];
  document.getElementById('front').style.background = color;
  const back = document.getElementById('back');
  back.style.background = color;
  back.classList.toggle('edited', !!song._edited);
  document.getElementById('counter').textContent = `${pos + 1} / ${deck.length}`;
  document.getElementById('artist').textContent = song.artist;
  document.getElementById('year').textContent = song.year;
  document.getElementById('title').textContent = song.track_name;
  document.getElementById('idx').textContent = (pos + 1);
  document.getElementById('verify').href = 'https://www.google.com/search?q=' + encodeURIComponent(song.artist + ' ' + song.track_name + ' release year');
  document.getElementById('prevBtn').disabled = pos === 0;
  document.getElementById('nextBtn').disabled = pos === deck.length - 1;
  renderQR(song.spotify_url);
}

function reshuffle() {
  deck = shuffle(songs);
  pos = 0;
  render();
}

function openEdit() {
  const raw = deck[pos];
  const song = effectiveSong(raw);
  document.getElementById('editSongInfo').textContent = `${song.artist} – ${song.track_name}`;
  document.getElementById('editYear').value = song.year;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editYear').focus(), 50);
}
function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
}
async function saveOverride() {
  const raw = deck[pos];
  const y = parseInt(document.getElementById('editYear').value, 10);
  if (!y || y < 1900 || y > 2099) { showStatus('Ungültiges Jahr', true); return; }
  if (y === raw.year_init) {
    // No-op vs init = treat as reset
    return resetOverride();
  }
  const prev = corrections[raw.id];
  corrections[raw.id] = { year_correct: y, correction_date: new Date().toISOString() };
  try {
    await saveCorrections();
    showStatus('Gespeichert');
    updateCorrCount();
    closeEdit();
    render();
  } catch (e) {
    if (prev) corrections[raw.id] = prev; else delete corrections[raw.id];
    showStatus('Speichern fehlgeschlagen', true);
    console.error(e);
  }
}
async function resetOverride() {
  const raw = deck[pos];
  const prev = corrections[raw.id];
  if (!prev) { closeEdit(); return; }
  delete corrections[raw.id];
  try {
    await saveCorrections();
    showStatus('Zurückgesetzt');
    updateCorrCount();
    closeEdit();
    render();
  } catch (e) {
    corrections[raw.id] = prev;
    showStatus('Zurücksetzen fehlgeschlagen', true);
    console.error(e);
  }
}

function updateCorrCount() {
  const n = Object.keys(corrections).length;
  document.getElementById('corrCount').textContent = `(${n})`;
}
function openList() {
  const list = document.getElementById('corrList');
  const ids = Object.keys(corrections);
  if (!ids.length) {
    list.innerHTML = '<div class="corr-empty">Noch keine Korrekturen vorhanden.</div>';
  } else {
    const songById = Object.fromEntries(songs.map(s => [s.id, s]));
    const items = ids.map(id => ({ id, c: corrections[id], s: songById[id] }))
      .filter(x => x.s)
      .sort((a,b) => (b.c.correction_date || '').localeCompare(a.c.correction_date || ''));
    list.innerHTML = items.map(x => {
      const safeArtist = (x.s.artist || '').replace(/</g,'&lt;');
      const safeTitle  = (x.s.track_name || '').replace(/</g,'&lt;');
      return `<div class="corr-item" data-id="${x.id}">
        <div class="info">
          <div class="title">${safeArtist} – ${safeTitle}</div>
          <div class="meta">${x.s.year_init} → korrigiert ${new Date(x.c.correction_date).toLocaleDateString('de-DE')}</div>
        </div>
        <div class="year">${x.c.year_correct}</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.corr-item').forEach(el => {
      el.onclick = () => jumpToSong(el.dataset.id);
    });
  }
  document.getElementById('listModal').classList.add('open');
}
function closeList() {
  document.getElementById('listModal').classList.remove('open');
}
function jumpToSong(id) {
  let idx = deck.findIndex(s => s.id === id);
  if (idx === -1) {
    // Song not in current deck (shouldn't happen) — put it on top
    const s = songs.find(x => x.id === id);
    if (!s) return;
    deck = [s, ...deck.filter(x => x.id !== id)];
    idx = 0;
  }
  pos = idx;
  closeList();
  render();
}

document.getElementById('listBtn').onclick = openList;
document.getElementById('listModal').onclick = closeList;
document.getElementById('flipBtn').onclick = () => document.getElementById('card').classList.toggle('flipped');
document.getElementById('nextBtn').onclick = () => { if (pos < deck.length - 1) { pos++; render(); } };
document.getElementById('prevBtn').onclick = () => { if (pos > 0) { pos--; render(); } };
document.getElementById('shuffleBtn').onclick = () => { if (confirm('Stapel wirklich neu mischen? Der aktuelle Spielverlauf geht verloren.')) reshuffle(); };
document.getElementById('editModal').onclick = closeEdit;

(async () => {
  try {
    await Promise.all([loadSongs(), loadCorrections()]);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('card').style.display = '';
    document.getElementById('flipBtn').disabled = false;
    document.getElementById('footer').textContent = `Daten v${songsVersion} · ${songs.length} Songs · App v2026-06-01-2029`;
    updateCorrCount();
    reshuffle();
  } catch (e) {
    document.getElementById('loading').textContent = 'Fehler beim Laden: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
